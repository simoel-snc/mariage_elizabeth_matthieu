<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline';
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src https://fonts.gstatic.com;
    img-src 'self' data:;
    connect-src 'self' https://script.google.com https://script.googleusercontent.com;
    form-action 'self';
    base-uri 'self';
    object-src 'none';
  ">
  <title>Elizabeth &amp; Matthieu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap"
    rel="stylesheet">
  <link rel="preload" as="image" href="img/assets/orangerie-venue.webp">
  <link rel="preload" as="image" href="img/assets/title-elizabeth-matthieu.webp">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <script>globalThis.PAGE_CONFIG = { hideHeader: true };</script>

  <div class="gate-screen" id="gateScreen">

    <picture>
      <source srcset="img/assets/orangerie-venue.webp" type="image/webp">
      <img class="gate-hero" src="img/assets/orangerie-venue.png" alt="L'Orangerie du Chenoy"
        width="1523" height="997">
    </picture>

    <picture>
      <source srcset="img/assets/title-elizabeth-matthieu.webp" type="image/webp">
      <img class="gate-wordmark" src="img/assets/title-elizabeth-matthieu.png" alt="Elizabeth & Matthieu"
        width="780" height="139">
    </picture>

    <p id="gateText" data-fr="Veuillez saisir votre mot de passe."
      data-nl="Gelieve uw wachtwoord in te voeren.">
      Veuillez saisir votre mot de passe.
    </p>

    <form class="pin-form" id="pinForm" onsubmit="return false;" autocomplete="off">
      <div class="pin-inputs" id="pinInputs">
        <input type="tel" inputmode="numeric" maxlength="1" pattern="[0-9]" class="pin-box" aria-label="PIN 1">
        <input type="tel" inputmode="numeric" maxlength="1" pattern="[0-9]" class="pin-box" aria-label="PIN 2">
        <input type="tel" inputmode="numeric" maxlength="1" pattern="[0-9]" class="pin-box" aria-label="PIN 3">
        <input type="tel" inputmode="numeric" maxlength="1" pattern="[0-9]" class="pin-box" aria-label="PIN 4">
      </div>
      <button type="submit" class="pin-submit" id="pinSubmit" data-fr="Valider" data-nl="Bevestigen">Valider</button>
      <p class="pin-error" id="pinError" style="display:none"></p>
    </form>

    <div class="gate-loader" id="gateLoader" style="display:none">
      <div class="spinner"></div>
    </div>

    <!-- Hidden chick peeking from the bottom right of the gate card -->
    <div class="deco deco-chick-corner" aria-hidden="true">
      <picture>
        <source srcset="img/assets/chick-single.webp" type="image/webp">
        <img src="img/assets/chick-single.png" alt="" width="113" height="144">
      </picture>
    </div>

  </div>

  <script src="js/header.js"></script>
  <script src="js/gate.js"></script>

</body>

</html>
